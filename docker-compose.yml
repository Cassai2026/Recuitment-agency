# =============================================================================
# Sovereign Network — Dual-Business Hub
# Lilieth Orchestrator Stack
# Ready to flash onto a 64-core / Threadripper workstation
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Internal mesh network — all DB traffic stays here, never exposed externally
# ---------------------------------------------------------------------------
networks:
  mesh:
    driver: bridge
    internal: true          # No external routing for the internal mesh.
                            # NOTE: containers on this network cannot reach the internet.
                            # All images must be pre-pulled or build-stage dependencies
                            # must be resolved before the mesh is attached.
                            # For outbound access from specific containers (e.g. LLM model
                            # downloads), temporarily attach them to a bridge network with
                            # external access, or use a host firewall instead of internal: true.
  frontend:
    driver: bridge           # Only the Nginx gateway touches both networks

# ---------------------------------------------------------------------------
# Persistent volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  rams_docs:
  llm_models:

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --------------------------------------------------------------------------
  # PostgreSQL — Dual-Business Hub database
  # Restricted to the internal mesh; never exposed on a host port
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: lilieth_postgres
    restart: unless-stopped
    networks:
      - mesh
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-lilieth_hub}
      POSTGRES_USER:     ${POSTGRES_USER:-lilieth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    # No ports block — only reachable within the mesh network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lilieth} -d ${POSTGRES_DB:-lilieth_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Redis — Zero-lag candidate matching cache
  # Restricted to the internal mesh
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lilieth_redis
    restart: unless-stopped
    networks:
      - mesh
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # No ports block — only reachable within the mesh network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # FastAPI Backend — Lilieth Orchestrator
  # Bridges the mesh (DB/cache) and the frontend network (Nginx)
  # --------------------------------------------------------------------------
  lilieth_orchestrator:
    build:
      context: ./lilieth_guard
      dockerfile: Dockerfile
    container_name: lilieth_orchestrator
    restart: unless-stopped
    networks:
      - mesh
      - frontend
    environment:
      DATABASE_URL:  postgresql+asyncpg://${POSTGRES_USER:-lilieth}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lilieth_hub}
      REDIS_URL:     redis://:${REDIS_PASSWORD}@redis:6379/0
      LLM_BRIDGE_URL: http://gemini_bridge:8080
      SECRET_KEY:    ${SECRET_KEY:?SECRET_KEY must be set}
      ENVIRONMENT:   ${ENVIRONMENT:-production}
    volumes:
      - rams_docs:/app/rams
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No host ports — traffic arrives only through Nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Nginx — Encrypted gateway (only externally exposed service)
  # Handles TLS termination and reverse-proxies to the FastAPI backend
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: lilieth_nginx
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "443:443"    # HTTPS — only exposed port
      - "80:80"      # HTTP → redirect to HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # Mount TLS certificates here
    depends_on:
      - lilieth_orchestrator
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # --------------------------------------------------------------------------
  # Gemini Bridge — Local LLM node (placeholder)
  # Provides a local inference endpoint compatible with the Gemini API contract
  # Replace the image/command with your chosen local model (e.g. Ollama, vLLM)
  # --------------------------------------------------------------------------
  gemini_bridge:
    image: ollama/ollama:latest        # Placeholder — swap for production model
    container_name: lilieth_gemini_bridge
    restart: unless-stopped
    networks:
      - mesh                           # LLM only on the internal mesh
    environment:
      OLLAMA_HOST: "0.0.0.0"
    volumes:
      - llm_models:/root/.ollama
    # Uncomment to expose GPU resources on the Threadripper workstation:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
